name: Deploy To shinyapps.io

on:
  push:
    branches:
      - master
    paths:
      - app/**
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::shiny
            any::bslib
            any::bsicons
            any::plotly
            any::quantmod
            any::TTR
            any::xts
            any::DT
            any::gt
            any::gtExtras
            any::rsconnect

      - name: Deploy app
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
          SHINYAPPS_APP_NAME: ${{ secrets.SHINYAPPS_APP_NAME }}
        run: |
          Rscript -e "rsconnect::setAccountInfo(name = Sys.getenv('SHINYAPPS_ACCOUNT'), token = Sys.getenv('SHINYAPPS_TOKEN'), secret = Sys.getenv('SHINYAPPS_SECRET')); rsconnect::deployApp(appDir = 'app', appName = Sys.getenv('SHINYAPPS_APP_NAME'), forceUpdate = TRUE)"
